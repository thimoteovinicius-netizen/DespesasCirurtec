<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora de Vapor de Água</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

h1{
  text-align:center;
}

label{
  display:block;
  margin-top:15px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:5px;
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#020617;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Vapor de Água</h1>

<label>Temperatura (°C)</label>
<input type="number" id="temp" placeholder="Ex: 121" oninput="calcFromTemp()">

<label>Pressão (bar)</label>
<input type="number" id="press" placeholder="Ex: 2.0" oninput="calcFromPress()">

<div class="result" id="resultado">
Aguardando entrada...
</div>

<button onclick="gerarPDF()">Gerar PDF</button>
</div>

<script>

// Antoine (2 faixas)
function tempToPressure(T){
  let A,B,C;

  if(T <= 99){
    A=8.07131; B=1730.63; C=233.426;
  }else{
    A=8.14019; B=1810.94; C=244.485;
  }

  const P_mmHg = 10**(A - (B/(T + C)));
  return P_mmHg * 0.00133322;
}

// inversão
function pressureToTemp(P){
  let Tmin=0, Tmax=200, Tmid;

  for(let i=0;i<40;i++){
    Tmid=(Tmin+Tmax)/2;
    const Pcalc=tempToPressure(Tmid);

    if(Pcalc > P){
      Tmax=Tmid;
    }else{
      Tmin=Tmid;
    }
  }

  return Tmid;
}

// cálculo via temperatura
function calcFromTemp(){
  const T = Number(document.getElementById("temp").value);
  if(isNaN(T)) return;

  const P = tempToPressure(T);

  document.getElementById("press").value = P.toFixed(3);

  mostrarResultado(T,P);
}

// cálculo via pressão
function calcFromPress(){
  const P = Number(document.getElementById("press").value);
  if(isNaN(P)) return;

  const T = pressureToTemp(P);

  document.getElementById("temp").value = T.toFixed(1);

  mostrarResultado(T,P);
}

// exibir resultado
function mostrarResultado(T,P){
  document.getElementById("resultado").innerHTML = `
    <b>Resultado:</b><br>
    Temperatura: ${T.toFixed(2)} °C<br>
    Pressão: ${P.toFixed(3)} bar<br><br>
    <small>Base: vapor saturado</small>
  `;
}

// PDF
function gerarPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const T = document.getElementById("temp").value;
  const P = document.getElementById("press").value;

  pdf.text("Relatório Termodinâmico", 10, 10);
  pdf.text(`Temperatura: ${T} °C`, 10, 20);
  pdf.text(`Pressão: ${P} bar`, 10, 30);
  pdf.text("Base: Vapor saturado de água", 10, 40);

  pdf.save("calculo_vapor.pdf");
}

</script>

</body>
</html>
