<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Despesas Cirurtec</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#f6f8fb;
  padding:15px;
  color:#2c3e50;
}
.header{text-align:center;margin-bottom:20px;}
.header img{max-width:160px;}
.card{
  background:#fff;padding:18px;border-radius:18px;margin-bottom:15px;
}
input,select,textarea{
  width:100%;padding:12px;margin-top:8px;border-radius:12px;
}
button{
  width:100%;padding:12px;margin-top:10px;border:none;border-radius:14px;
  background:#1976d2;color:#fff;
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="header">
  <img src="1000644584.png">
  <h2>Despesas Cirurtec</h2>
</div>

<div class="card">
  <input id="nome" placeholder="Nome">
  <input id="email" placeholder="E-mail">
</div>

<div class="card">
  <input type="number" id="valor" placeholder="Valor (R$)">
</div>

<div class="card">
  <button onclick="gerarPDF()">📄 Gerar PDF</button>
  <button onclick="enviarEmail()">📧 Enviar por E-mail</button>
  <button onclick="enviarWhats()">📲 Enviar por WhatsApp</button>
</div>

<script>

let pdfBlob = null;

async function gerarPDF(){

  const {jsPDF} = window.jspdf;
  const pdf = new jsPDF();

  pdf.text("Relatório de Despesas",10,10);
  pdf.text("Nome: "+nome.value,10,20);
  pdf.text("Email: "+email.value,10,30);
  pdf.text("Valor: R$ "+valor.value,10,40);

  // gerar blob
  pdfBlob = pdf.output("blob");

  alert("PDF gerado com sucesso!");
}

// 📧 EMAIL
async function enviarEmail(){

  if(!pdfBlob){
    alert("Gere o PDF primeiro!");
    return;
  }

  const file = new File([pdfBlob], "Despesas.pdf", {type:"application/pdf"});

  if(navigator.share){
    await navigator.share({
      title:"Relatório de Despesas",
      text:"Segue relatório em anexo",
      files:[file]
    });
  }else{
    alert("Seu dispositivo não suporta envio automático.");
  }
}

// 📲 WHATSAPP
async function enviarWhats(){

  if(!pdfBlob){
    alert("Gere o PDF primeiro!");
    return;
  }

  const file = new File([pdfBlob], "Despesas.pdf", {type:"application/pdf"});

  if(navigator.share){
    await navigator.share({
      title:"Relatório",
      text:"Segue relatório de despesas",
      files:[file]
    });
  }else{
    alert("Compartilhamento não suportado.");
  }
}

</script>

</body>
</html>
