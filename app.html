<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Despesas Cirurtec</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#f6f8fb;
  padding:15px;
  color:#2c3e50;
}

.header{text-align:center;margin-bottom:20px;}
.header img{max-width:160px;margin-bottom:6px;}
.header h1{font-size:18px;color:#1976d2;}

.card{
  background:#fff;
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:0 6px 16px rgba(0,0,0,0.06);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #e0e4ea;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  cursor:pointer;
}

.btn-primary{background:#1976d2;color:#fff;}
.btn-sec{background:#e3f2fd;color:#1976d2;}
.btn-del{background:#fdecea;color:#c62828;}

.hidden{display:none;}

.despesa,.anexo{
  background:#f9fafb;
  border-radius:12px;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <img src="1000644584.png">
  <h1>Despesas Cirurtec</h1>
</div>

<div class="card">
  <input id="nome" placeholder="Nome do técnico">
  <input id="email" placeholder="E-mail">
</div>

<div class="card">
  <label>Data início</label>
  <input type="datetime-local" id="dataInicio">
  <label>Data final</label>
  <input type="datetime-local" id="dataFim">
  <input type="number" id="adiantamento" placeholder="Adiantamento (R$)">
</div>

<div class="card">
  <h3>Trajeto</h3>
  <input id="origem" placeholder="Origem">
  <button class="btn-sec" onclick="addParada()">+ Parada</button>
  <div id="paradas"></div>
  <input id="destino" placeholder="Destino">
</div>

<div class="card">
  <h3>Nova despesa</h3>

  <select id="categoria" onchange="controleCategoria()">
    <option value="">Categoria</option>
    <option>Alimentação</option>
    <option>Bônus de viagem</option>
    <option>Veículo próprio</option>
    <option>Combustível</option>
    <option>Pedágios</option>
    <option>Peças</option>
    <option>Hospedagem</option>
    <option>Outros</option>
  </select>

  <select id="sub" class="hidden" onchange="calcularValor()">
    <option value="">Refeição</option>
    <option>Almoço</option>
    <option>Café da tarde</option>
    <option>Jantar</option>
  </select>

  <input type="number" id="qtd" class="hidden" placeholder="Quantidade" oninput="calcularValor()">
  <input id="outros" class="hidden" placeholder="Descrição">

  <input id="valor" type="number" placeholder="Valor (R$)" readonly>

  <button class="btn-primary" onclick="addDespesa()">Adicionar</button>
</div>

<div class="card">
  <h3>Despesas</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>Anexos</h3>

  <button class="btn-sec" onclick="camera.click()">📸 Câmera</button>
  <input id="camera" type="file" accept="image/*" capture="environment" multiple hidden>

  <button class="btn-sec" onclick="galeria.click()">🖼️ Galeria</button>
  <input id="galeria" type="file" accept="image/*" multiple hidden>

  <div id="listaAnexos"></div>
</div>

<div class="card">
  <textarea id="observacoes" placeholder="Observações"></textarea>
</div>

<div class="card">
  <button class="btn-primary" onclick="finalizar()">Gerar PDF</button>
</div>

<script>

let despesas=[], anexos=[];

function formatarDataHora(dt){
  if(!dt) return "";
  const [data, hora] = dt.split("T");
  const [y,m,d] = data.split("-");
  return `${d}/${m}/${y} ${hora}`;
}

function addParada(){
  paradas.innerHTML+=`<input placeholder="Cidade parada">`;
}

function controleCategoria(){
  sub.classList.add("hidden");
  qtd.classList.add("hidden");
  outros.classList.add("hidden");

  valor.value="";
  valor.readOnly=true;

  if(categoria.value==="Alimentação"){
    sub.classList.remove("hidden");
    qtd.classList.remove("hidden");
  }

  if(["Bônus de viagem","Veículo próprio"].includes(categoria.value)){
    qtd.classList.remove("hidden");
    calcularValor();
  }

  if(categoria.value==="Outros"){
    outros.classList.remove("hidden");
    valor.readOnly=false;
  }

  if(["Combustível","Pedágios","Peças","Hospedagem"].includes(categoria.value)){
    valor.readOnly=false;
  }
}

function calcularValor(){
  const q=Number(qtd.value)||0;

  if(categoria.value==="Alimentação"){
    const t={Almoço:10,"Café da tarde":10,Jantar:40};
    if(t[sub.value]&&q) valor.value=t[sub.value]*q;
  }

  if(categoria.value==="Bônus de viagem") valor.value=25*q;
  if(categoria.value==="Veículo próprio") valor.value=(1.28*q).toFixed(2);
}

function addDespesa(){
  if(!categoria.value||!valor.value) return alert("Preencha os dados");

  despesas.push({
    categoria:categoria.value,
    detalhe:sub.value||outros.value||"",
    quantidade:Number(qtd.value)||1,
    valorTotal:Number(valor.value)
  });

  renderDespesas();

  categoria.value=sub.value=qtd.value=outros.value=valor.value="";
  controleCategoria();
}

function renderDespesas(){
  lista.innerHTML="";
  despesas.forEach((d,i)=>{
    lista.innerHTML+=`
      <div class="despesa">
        ${d.categoria} – R$ ${d.valorTotal.toFixed(2)}
        <button onclick="editarDespesa(${i})">Editar</button>
        <button class="btn-del" onclick="removerDespesa(${i})">Excluir</button>
      </div>`;
  });
}

function removerDespesa(i){
  despesas.splice(i,1);
  renderDespesas();
}

function editarDespesa(i){
  const d=despesas[i];

  categoria.value=d.categoria;
  controleCategoria();

  if(d.categoria==="Outros") outros.value=d.detalhe;
  else sub.value=d.detalhe;

  qtd.value=d.quantidade;
  valor.value=d.valorTotal;

  despesas.splice(i,1);
  renderDespesas();
}

function processarArquivos(input){
  [...input.files].forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      anexos.push({img:e.target.result,desc:""});
      renderAnexos();
    };
    r.readAsDataURL(f);
  });
}

camera.onchange=()=>processarArquivos(camera);
galeria.onchange=()=>processarArquivos(galeria);

function removerAnexo(i){
  if(confirm("Excluir anexo?")){
    anexos.splice(i,1);
    renderAnexos();
  }
}

function renderAnexos(){
  listaAnexos.innerHTML="";
  anexos.forEach((a,i)=>{
    listaAnexos.innerHTML+=`
      <div class="anexo">
        <img src="${a.img}" width="100%">
        <textarea placeholder="Descrição"
          oninput="anexos[${i}].desc=this.value"></textarea>
        <button class="btn-del" onclick="removerAnexo(${i})">Excluir</button>
      </div>`;
  });
}

async function finalizar(){

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  let y=10,total=0;
  const ad = Number(adiantamento.value)||0;

  pdf.setFontSize(14);
  pdf.text("Cirurtec Hospitalar LTDA",10,y); y+=8;

  pdf.setFontSize(10);
  pdf.text(`Técnico: ${nome.value}`,10,y); y+=5;
  pdf.text(`E-mail: ${email.value}`,10,y); y+=5;
  pdf.text(`Data início: ${formatarDataHora(dataInicio.value)}`,10,y); y+=5;
  pdf.text(`Data final: ${formatarDataHora(dataFim.value)}`,10,y); y+=8;

  pdf.text("Trajeto",10,y); y+=5;
  pdf.text(`Origem: ${origem.value}`,10,y); y+=5;

  [...paradas.children].forEach((p,i)=>{
    const cidade=p.querySelector("input").value;
    if(cidade){
      pdf.text(`Parada ${i+1}: ${cidade}`,10,y);
      y+=5;
    }
  });

  pdf.text(`Destino: ${destino.value}`,10,y); y+=8;

  const porCategoria={};

  despesas.forEach(d=>{
    if(!porCategoria[d.categoria]) porCategoria[d.categoria]=[];
    porCategoria[d.categoria].push(d);
    total+=d.valorTotal;
  });

  pdf.text("Despesas",10,y); y+=6;

  for(const cat in porCategoria){
    pdf.text(cat,10,y); y+=5;

    porCategoria[cat].forEach(d=>{
      pdf.text(`${d.detalhe||"-"} | Qtd: ${d.quantidade} | R$ ${d.valorTotal.toFixed(2)}`,12,y);
      y+=5;

      if(y>270){
        pdf.addPage();
        y=10;
      }
    });

    y+=3;
  }

  pdf.text(`Adiantamento: R$ ${ad.toFixed(2)}`,10,y); y+=5;
  pdf.text(`Total gasto: R$ ${total.toFixed(2)}`,10,y); y+=5;

  const saldo=ad-total;
  pdf.text(`Saldo final: R$ ${saldo.toFixed(2)} ${saldo<0?"(NEGATIVO)":"(RESTANTE)"}`,10,y);

  if(observacoes.value){
    pdf.addPage();
    pdf.text("Observações:",10,10);
    pdf.text(observacoes.value,10,20,{maxWidth:190});
  }

  if(anexos.length){
    pdf.addPage();
    y=10;

    for (const a of anexos) {

      const img = new Image();
      img.src = a.img;

      await new Promise(resolve => {
        img.onload = resolve;
      });

      const largura = 180;
      const proporcao = img.width / img.height;
      const altura = largura / proporcao;

      if (y + altura > 280) {
        pdf.addPage();
        y = 10;
      }

      pdf.addImage(a.img,"JPEG",15,y,largura,altura);

      if(a.desc){
        pdf.text(a.desc,15,y+altura+5);
        y+=altura+15;
      }else{
        y+=altura+10;
      }
    }
  }

  pdf.save("Despesas_Cirurtec.pdf");
}

</script>

</body>
</html>
